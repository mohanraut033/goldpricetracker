name: Gold Tracker

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          BOT_TOKEN: ${{ secrets.8754524312:AAHesqteNjbAcnxsHpr8J9LAdRlGTc1pW4M }}
          CHAT_ID: ${{ secrets.1091940427 }}
        run: python gold_price_tracker.py
